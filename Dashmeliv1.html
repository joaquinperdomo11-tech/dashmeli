<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard de Ventas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f9f9f9;
      color: #333;
    }
    h1 { text-align: center; margin-bottom: 20px; }
    #filters { margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    select, input { padding: 5px 10px; font-size: 14px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #fff;
    }
    th, td {
      padding: 8px 12px;
      border: 1px solid #ccc;
      text-align: left;
    }
    th {
      background: #0072ce;
      color: white;
    }
    tr:nth-child(even) {
      background: #f2f2f2;
    }
    #loader { text-align: center; font-size: 18px; margin-top: 50px; }
  </style>
</head>
<body>

<h1>Dashboard de Ventas</h1>

<div id="filters">
  <label>Producto:
    <select id="filterProducto">
      <option value="">Todos</option>
    </select>
  </label>
  <label>Desde:
    <input type="date" id="filterDesde">
  </label>
  <label>Hasta:
    <input type="date" id="filterHasta">
  </label>
  <button onclick="aplicarFiltros()">Aplicar filtros</button>
</div>

<div id="loader">Cargando datos...</div>
<table id="tablaVentas" style="display:none">
  <thead>
    <tr>
      <th>Fecha</th>
      <th>Hora</th>
      <th>Producto</th>
      <th>Cantidad</th>
      <th>Precio Unitario</th>
      <th>Total</th>
      <th>Comisión</th>
      <th>Tipo de Envío</th>
      <th>Medio de Pago</th>
      <th>Cuotas</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxgm38hrmrZ6UcD7-qDv-E0EDrgniLGgsR7Ms7chhlNOoxv4e7T8ieKcve5BDlHFTyzuw/exec";

  let ventas = [];

  function mostrarDatos(data) {
    ventas = data.map(d => {
      // Convertir fecha y hora
      let fechaHora = new Date(d["date_created"]);
      d.fecha = fechaHora.toLocaleDateString('es-UY');
      d.hora = fechaHora.toLocaleTimeString('es-UY');
      return d;
    });

    // Poblar select de productos
    const productos = [...new Set(ventas.map(v => v["Producto"] || v["item_title"]))];
    const select = document.getElementById("filterProducto");
    productos.forEach(p => {
      const option = document.createElement("option");
      option.value = p;
      option.textContent = p;
      select.appendChild(option);
    });

    mostrarTabla(ventas);
    document.getElementById("loader").style.display = "none";
    document.getElementById("tablaVentas").style.display = "table";
  }

  function mostrarTabla(datos) {
    const tbody = document.querySelector("#tablaVentas tbody");
    tbody.innerHTML = "";
    datos.forEach(v => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${v.fecha || ""}</td>
        <td>${v.hora || ""}</td>
        <td>${v["Producto"] || v["item_title"] || ""}</td>
        <td>${v.Cantidad || v["quantity"] || ""}</td>
        <td>${v["Precio Unitario"] || v["unit_price"] || ""}</td>
        <td>${v.Total || v["total"] || ""}</td>
        <td>${v.Comision || v["sale_fee"] || ""}</td>
        <td>${v["Tipo de Envío"] || v["logistic_type"] || ""}</td>
        <td>${v["Medio de Pago"] || v["payment_method"] || ""}</td>
        <td>${v.Cuotas || v["installments"] || ""}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function aplicarFiltros() {
    const producto = document.getElementById("filterProducto").value;
    const desde = document.getElementById("filterDesde").value;
    const hasta = document.getElementById("filterHasta").value;

    const filtradas = ventas.filter(v => {
      let fecha = new Date(v.fecha.split("-").reverse().join("-"));
      let ok = true;
      if (producto) ok = ok && (v["Producto"] === producto || v["item_title"] === producto);
      if (desde) ok = ok && fecha >= new Date(desde);
      if (hasta) ok = ok && fecha <= new Date(hasta);
      return ok;
    });

    mostrarTabla(filtradas);
  }

  // JSONP
  var script = document.createElement('script');
  script.src = API_URL + "?callback=mostrarDatos";
  document.body.appendChild(script);
</script>

</body>
</html>
